<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skymark</title>
    <link rel="stylesheet" href="./src/styles/tokens.css" />
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body>
    <div id="app">
      <header class="titlebar">
        <span id="vault-prefix" hidden></span>
        <span class="doc-title" id="doc-title">Untitled</span>
        <span class="dirty-indicator" id="dirty-indicator" hidden>&#x25CF;</span>
        <span style="flex:1"></span>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">&#x1F319;</button>
        <button id="settings-btn" class="settings-btn" aria-label="Settings">⚙</button>
        <div id="settings-dropdown" class="settings-dropdown" hidden>
            <label>
                Scan depth
                <input type="number" id="settings-depth" min="1" max="10" value="2" />
            </label>
        </div>
        <div id="export-dropdown-root"></div>
        <button id="update-check-btn" class="update-check-btn" aria-label="Check for updates" hidden>&#x2191;</button>
      </header>
      <div id="update-banner-root"></div>
      <div id="tab-bar" hidden></div>
      <main class="panes">
        <section class="pane sidebar-pane" id="sidebar" hidden></section>
        <div id="sidebar-resizer" hidden></div>
        <section class="pane editor-pane" id="editor">
          <div id="reload-banner" hidden>
            <span id="reload-banner-msg">This file was changed on disk.</span>
            <button id="reload-confirm">Reload</button>
            <button id="reload-dismiss">Keep Mine</button>
          </div>
          <div id="format-toolbar"></div>
        </section>
        <section class="pane preview-pane" id="preview"></section>
      </main>
    </div>
    <script type="module" src="./src/main.ts"></script>
    <div id="toast-root"></div>
    <div id="palette-overlay"></div>
  </body>
</html>
